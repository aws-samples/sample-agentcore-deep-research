stack_name_base: Correlate-stack

# Optional: Set to automatically create an admin user and email credentials
# If not provided, you'll need to manually create users via AWS Console
admin_user_email: null # Example: admin@example.com

backend:
  pattern: strands-deep-research # Available patterns: strands-single-agent, langgraph-single-agent, strands-deep-research
  deployment_type: docker # Available deployment types: docker (default), zip

# API Keys for research tools (used by strands-deep-research pattern)
# Get your Tavily API key at: https://tavily.com/
api_keys:
  tavily: null # Example: tvly-xxxxxxxxxxxxxxxx
